<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      defer
      src="https://kit.fontawesome.com/852a4f6fd4.js"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"
    ></script>
    <script defer src="../script.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <title>Single Student Registration</title>
  </head>
  <body>
    <header class="header">
      <div class="header__wrapper wrapper">
        <a href="/"
          ><img
            class="header__logo"
            src="../img/logo.png"
            alt="logo"
            width="100px"
            height="auto"
        /></a>
        <nav>
          <ul class="header__nav-links">
            <li class="header__nav-item">
              <a class="header__nav-link header-btn" href="../index.html"
                >Home</a
              >
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link header-btn" href="#">Attend AGU</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link header-btn" href="#">Host</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link header-btn" href="#">Blog</a>
            </li>

            <li class="header__nav-item">
              <a
                class="header__nav-link header-btn free-quote-btn"
                href="#section-cta"
                >Contact Us</a
              >
            </li>
          </ul>
        </nav>

        <button class="header__btn-mobile">
          <i
            class="icon-mobile-nav fa-solid fa-bars fa-2x"
            aria-hidden="true"
          ></i>
          <i
            class="icon-mobile-nav fa-solid fa-xmark fa-2x"
            aria-hidden="true"
          ></i>
        </button>
      </div>
    </header>
    <main>
      <section class="form">
        <div class="wrapper form__wrapper">
          <h1 class="form__title">Single Student Registration</h1>
          <form class="form__submission" action="">
            <div class="form__input">
              <label for="first-name">First name</label>
              <input id="first-name" type="text" placeholder="Joe" />
            </div>
            <div class="form__input">
              <label for="last-name">Last name</label>
              <input id="last-name" type="text" placeholder="Smith" />
            </div>
            <div class="form__input">
              <label for="company-name">Company name (if applicable)</label>
              <input
                id="company-name"
                type="text"
                placeholder="Auto Glass Company"
              />
            </div>
            <div class="form__input">
              <label for="">Address</label>
              <input type="text" placeholder="123 Auto St." />
            </div>
            <div class="form__input">
              <label for="">Apartment, Suite, etc</label>
              <input type="text" placeholder="Unit #123" />
            </div>
            <div class="form__input">
              <label for="">City</label>
              <input type="text" placeholder="Glasstown" />
            </div>
            <div class="form__input">
              <label for="state">State</label>
              <input id="state" type="text" placeholder="State" />
            </div>
            <div class="form__input">
              <label for="zip">ZIP / Postal Code</label>
              <input id="zip" type="number" placeholder="12345" />
            </div>

            <div class="form__radio">
              <label for="">Is this a home or business?</label>
              <input type="radio" name="home" id="location" value="home" />
              <label for="home">Home</label>

              <input
                type="radio"
                name="business"
                id="location"
                value="business"
              />
              <label for="home">Business</label>
            </div>
            <div class="form__button-div">
              <button class="form__submit" type="submit">
                Submit Application
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
